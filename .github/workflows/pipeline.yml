name: WeOn SDK CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2

      - name: Build SDK
        working-directory: ./code
        run: zig build --prefix ../bin -Dtarget=x86_64-linux-gnu -Doptimize=ReleaseFast

      - name: Compile Validation Suite
        run: |
          gcc tests/main.c -Icode/include -Lbin/lib -lweon-sdk -ldl -o validate_test
      - name: Run Integration Tests
        run: |
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$(pwd)/bin/linux-x86_64
          ./validate_test